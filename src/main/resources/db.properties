# Local MySQL connection for Smart Lab
# Update these values for your machine.
db.url=jdbc:mysql://localhost:3306/smart_lab?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
db.user=root
db.password=

# Base URL used for payment callback URLs and hosted checkout return URLs.
# Include the webapp context path, no trailing slash.
# Example (local): http://localhost:8080/smart-lab-management
app.base_url=

# eSewa setup
# mode: test | production
esewa.mode=test
esewa.product_code=EPAYTEST
esewa.secret_key=8gBm/:&EnhH.1/q

# Optional endpoint overrides (keep blank to use defaults by mode)
esewa.form_url=
esewa.status_url=

# Khalti ePayment setup
# mode: test | production
# Use the merchant secret key from Khalti sandbox or production dashboard.
# `app.base_url` should be set when testing callbacks outside localhost.
khalti.mode=test
khalti.secret_key=

# Optional override if you want Khalti to show a different website URL
khalti.website_url=

# Optional endpoint overrides (keep blank to use defaults by mode)
khalti.initiate_url=
khalti.lookup_url=
